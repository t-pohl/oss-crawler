name: Windows standalone build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install project + build extras
        run: pip install -e ".[build]"

      - name: Install Chromium inside the playwright package
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: playwright install chromium

      - name: Build standalone .exe with PyInstaller
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: pyinstaller --clean --noconfirm oss-crawler.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oss-crawler-windows
          path: dist/oss-crawler.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/oss-crawler.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
